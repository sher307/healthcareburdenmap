<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Claude - Health Care Burden Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,opsz,wght@0,14..32,400..600;1,14..32,400..600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chat.style.css" />
</head>
<body>

  <!--<div class="back-to-map-btn-container">-->
   <button id="back-to-map-btn">
    <a href="index.html">Back to map</a></button>
 <!-- </div>-->

  <div id="app">
    <header>
      <p class="subtitle">Ask Claude</p>
      <h1>Have more questions?</h1>
    </header>

    <div id="messages">
      <!-- Chat messages appear here -->
      <div class="message assistant">
        <div class="bubble">Ask a question about this map and its data sources.</div>
      </div>
    </div>

    <div id="input-area">
      <input
        id="user-input"
        type="text"
        placeholder="What would you like to know about the map?"
        autocomplete="off"
      />
      <button id="send-btn"> <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path fill="black" d="M12 5.2 20 16.5H4L12 5.2z"/></button>
    </div>
  </div>
  <script src="server.js"></script>
  <script src="app.js"></script>
</body>
</html>
